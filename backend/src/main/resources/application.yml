spring:
  application:
    name: safety-ai-control

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/safety_smartyard_control?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC}
    username: ${DB_USERNAME:admin123}
    password: ${DB_PASSWORD:admin123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

server:
  port: ${SERVER_PORT:8080}

app:
  upload-dir: ${UPLOAD_DIR:uploads}
  weather:
    kma-service-key: ${KMA_SERVICE_KEY:}
    grid-x: ${KMA_GRID_X:90}
    grid-y: ${KMA_GRID_Y:69}
  bootstrap-admin:
    username: ${BOOTSTRAP_ADMIN_USERNAME:}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:}
    name: ${BOOTSTRAP_ADMIN_NAME:관리자}

plugins {
    id 'base'
}

tasks.register('bootRun') {
    group = 'application'
    description = 'Runs the Spring Boot backend module.'
    dependsOn(':backend:bootRun')
}

tasks.register('backendTest') {
    group = 'verification'
    description = 'Runs backend tests.'
    dependsOn(':backend:test')
}

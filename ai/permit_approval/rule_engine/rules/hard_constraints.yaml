# 단일 작업허가서 하드/조건부 위반 규칙 — 명세 §6.1
#
# 이 파일은 코드가 아니다. 도메인 조사 결과를 팀원이 코드 수정 없이 채울 수 있어야 한다.
#
# !! legal_ref 주의 !!
# 아래 조문 번호는 잠정값이다. 명세 §9의 4단계(Retrieval)에서 국가법령정보
# OPEN API로 실제 조문을 수집한 뒤 교차 검증해야 한다. 검증 전까지는 화면에
# 확정 근거로 노출하지 말 것.
#
# condition에서 쓸 수 있는 키 (engine.py의 _match_single 참고):
#   work_type            : [WorkType, ...]  — 이 중 하나면 매치
#   area_type            : [AreaType, ...]  — 생략 시 무시
#   special_conditions   : {필드: bool}     — 전부 일치해야 매치
#   supervisor_present   : bool
#   missing_ppe          : [PPE명, ...]     — 하나라도 declared_ppe에 없으면 매치
#   worker_count_gte     : int

- rule_id: HARD-001
  name: 밀폐공간 가스농도 미측정
  severity: hard
  risk_category: 질식중독
  summary: 밀폐공간 작업 전 산소·유해가스 농도를 측정하지 않았다.
  condition:
    work_type: [밀폐공간작업]
    special_conditions:
      gas_measured: false
  legal_ref: 산업안전보건기준에 관한 규칙 제619조의2(산소 및 유해가스 농도의 측정)

- rule_id: HARD-002
  name: 밀폐공간 감시인 미배치
  severity: hard
  risk_category: 질식중독
  summary: 밀폐공간 작업에 외부 감시인이 배치되지 않았다.
  condition:
    work_type: [밀폐공간작업]
    supervisor_present: false
  # 검증됨(2026-07-22): 제619조제2항제2호가 작업 시작 전 확인 사항으로
  # "관리감독자, 근로자, 감시인 등 작업자 정보"를 명시한다.
  legal_ref: 산업안전보건기준에 관한 규칙 제619조(밀폐공간 작업 프로그램의 수립ㆍ시행)

- rule_id: HARD-003
  name: 화기작업 인화물 인접 + 환기 미실시
  severity: hard
  risk_category: 화재폭발
  summary: 인접 인화물이 존재하는 상태에서 환기 없이 화기작업을 신청했다.
  condition:
    work_type: [화기작업, 용접]
    special_conditions:
      adjacent_flammable: true
      ventilation: false
  legal_ref: 산업안전보건기준에 관한 규칙 제241조(화재위험작업 시의 준수사항)

- rule_id: HARD-004
  name: 탱크 내부 화기작업 환기 미실시
  severity: hard
  risk_category: 화재폭발
  summary: 탱크 내부에서 환기 없이 화기작업을 신청했다.
  condition:
    work_type: [화기작업, 용접]
    area_type: [탱크]
    special_conditions:
      ventilation: false
  legal_ref: 산업안전보건기준에 관한 규칙 제232조(폭발 또는 화재 등의 예방)

- rule_id: COND-001
  name: 화기작업 필수 보호구 누락
  severity: conditional
  risk_category: 인적
  summary: 화기작업 신청서에 용접보안면이 명시되지 않았다.
  condition:
    work_type: [화기작업, 용접]
    missing_ppe: [용접보안면]
  legal_ref: 산업안전보건기준에 관한 규칙 제32조(보호구의 지급 등)

- rule_id: COND-002
  name: 밀폐공간 환기 미실시
  severity: conditional
  risk_category: 질식중독
  summary: 가스 측정은 했으나 작업 중 환기 계획이 없다.
  condition:
    work_type: [밀폐공간작업]
    special_conditions:
      gas_measured: true
      ventilation: false
  legal_ref: 산업안전보건기준에 관한 규칙 제620조(환기 등)

- rule_id: COND-003
  name: 양중작업 관리감독자 부재
  severity: conditional
  risk_category: 인적
  summary: 양중작업에 작업지휘자·관리감독자가 지정되지 않았다.
  condition:
    work_type: [양중]
    supervisor_present: false
  # 검증됨(2026-07-22): 조문 실재 확인.
  # TODO(팀확인): 제39조는 제38조제1항 각 호 작업에 적용된다. 양중작업이 해당
  # 호에 포함되는지 도메인 확인 필요 (별표/제38조 목록 대조).
  legal_ref: 산업안전보건기준에 관한 규칙 제39조(작업지휘자의 지정)

- rule_id: COND-004
  name: 대규모 인원 작업 감독자 부재
  severity: conditional
  risk_category: 인적
  summary: 10인 이상이 투입되는 작업에 관리감독자가 지정되지 않았다.
  condition:
    worker_count_gte: 10
    supervisor_present: false
  # 검증됨(2026-07-22): 조문·제목 일치.
  legal_ref: 산업안전보건기준에 관한 규칙 제35조(관리감독자의 유해ㆍ위험 방지 업무 등)

- rule_id: COND-005
  name: 화기작업 화재감시자 미배치
  severity: conditional
  risk_category: 화재폭발
  summary: 인접 인화물이 있는 화기·용접 작업에 화재감시자가 배치되지 않았다.
  condition:
    work_type: [화기작업, 용접]
    special_conditions:
      adjacent_flammable: true
      fire_watch_assigned: false
  # 검증됨(2026-07-22): 조문·제목 일치. 제241조의2제1항은 용접ㆍ용단 작업 시
  # "작업반경 11미터 이내에 가연성물질이 있는 장소" 등에서 화재감시자 지정ㆍ배치를
  # 의무화한다. 우리 스키마의 adjacent_flammable이 그 상황에 대응한다.
  #
  # hard가 아니라 conditional인 이유: 같은 항 단서가 "경보용 설비ㆍ기구, 소화설비
  # 또는 소화기가 갖추어진 경우"를 면제하고 있어, 배치 여부만으로 즉시 반려를
  # 단정할 수 없다. 조건 충족 시 작업 가능하다는 판단은 사람이 한다.
  #
  # HARD-003(인화물+환기없음)과 조건이 겹칠 수 있으나 의도된 것이다. hard가 있으면
  # 반려로 확정되고, 이 항목은 위반 목록에 남아 "무엇을 보완해야 하는지"를 설명한다.
  legal_ref: 산업안전보건기준에 관한 규칙 제241조의2(화재감시자)
